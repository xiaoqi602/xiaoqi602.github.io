<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .b{
        width: 300px;
        height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: linear-gradient(180deg,rgb(24, 119, 235),rgb(174, 172, 174),rgb(128, 0, 117));
        border-radius: 0px;
        box-shadow: 400px 400px 400px 400px 400px #565454 outset;
       }
       .w{
        width: 245px;
        height: 245px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: linear-gradient(150deg,rgb(128, 0, 117),rgb(24, 119, 235));
        border-radius: 10px;
        box-shadow: 400px 400px 400px 400px 400px #565454 outset;
       }
       .z{
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        outline-style: solid;
        outline-width: 15px;
        border-radius: 10px;
        background-image: linear-gradient(150deg,rgb(189, 45, 194),rgb(47, 115, 200));
       }
       .ny{
        width: 110px;
        height: 110px;
        border-radius: 100%;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
       }
       .nj{
        width: 0;
        height: 0;
        border-left: 40px solid black;
        border-top: 40px solid transparent;
        border-bottom: 40px solid transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 16px;
       }
    </style>
</head>
<body>
    <div class="b">
        <div class="w">
            <div class="z">
                <div class="ny">
                    <div class="nj"></div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
